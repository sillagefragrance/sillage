<style>
  :root {
    --cream: #F5F3FF;
    --ink: #1A1525;
    --warm: #9B7FC7;
    --accent: #7C5CBF;
    --soft: #E8E2F7;
    --muted: #9E93B8;
    --card: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .quiz-wrap {
    width: 100%;
    max-width: 640px;
  }

  /* HEADER */
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 3rem;
  }

  /* PROGRESS */
  .progress-bar {
    width: 100%;
    height: 1px;
    background: var(--soft);
    margin-bottom: 3rem;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-align: right;
    margin-top: 0.5rem;
    text-transform: uppercase;
  }

  /* QUESTION */
  .question-block {
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.5s forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .page-label {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 0.75rem;
  }

  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    line-height: 1.3;
    margin-bottom: 2.5rem;
    color: var(--ink);
  }

  .question-text em {
    font-style: italic;
    color: var(--accent);
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option {
    border: 1px solid var(--soft);
    background: white;
    padding: 1.1rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--ink);
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  .option:hover {
    border-color: var(--warm);
    color: var(--accent);
    padding-left: 2rem;
  }

  .option:hover::before {
    width: 3px;
  }

  .option.selected {
    border-color: var(--accent);
    background: var(--soft);
    color: var(--accent);
    padding-left: 2rem;
    font-weight: 500;
  }

  .option.selected::before {
    width: 3px;
  }

  /* MULTI SELECT HINT */
  .hint {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 1.2rem;
  }

  /* NAV BUTTONS */
  .btn-row {
    margin-top: 2.5rem;
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  .next-btn {
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 1rem 2.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .next-btn:hover {
    background: var(--accent);
  }

  .back-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--soft);
    padding: 1rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .next-btn.disabled {
    background: var(--soft);
    color: var(--muted);
    cursor: not-allowed;
    pointer-events: none;
  }

  /* RESULTS */
  .results-block {
    opacity: 0;
    animation: fadeUp 0.6s forwards;
  }

  .results-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .results-headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 2.5rem;
    color: var(--ink);
  }

  .perfume-card {
    background: white;
    border: 1px solid var(--soft);
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    animation: fadeUp 0.5s forwards;
    opacity: 0;
  }

  .perfume-card.perfect {

  }

    font-size: 0.85rem;

  }

  .perfume-card.similar .perfume-notes {
    color: var(--muted);
  }

  .perfume-card:nth-child(1) { animation-delay: 0.1s; }
  .perfume-card:nth-child(2) { animation-delay: 0.2s; }
  .perfume-card:nth-child(3) { animation-delay: 0.3s; }

  .perfume-rank {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--warm);
    margin-bottom: 0.3rem;
  }

  .perfume-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.2rem;
  }

  .perfume-brand {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;

  .perfume-notes {

    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
</style>

// RENDER ENGINE
// ============================================================
function render() {
  const container = document.getElementById('quizContainer');
  const pct = ((currentStep - 1) / TOTAL_STEPS) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Step ${currentStep} of ${TOTAL_STEPS}`;

  if (currentStep > TOTAL_STEPS) {
    renderResults();
    return;
  }

  const step = steps[currentStep - 1];
  let options = step.options;

  // Dynamic branch options
  if (step.dynamic) {
    options = branches[answers.scent] || [];
  }

  const isMulti = step.type === 'multi';
  const selectedVals = answers[step.key] || (isMulti ? [] : null);

  container.innerHTML = `
    <div class="question-block">
      <div class="page-label">${step.page}</div>
      <div class="question-text">${step.question}</div>
      ${step.hint ? `<div class="hint">${step.hint}</div>` : ''}
      <div class="options">
        ${options.map(opt => `
          <button class="option ${isSelected(step.key, opt.value, isMulti) ? 'selected' : ''}"
            onclick="selectOption('${step.key}', '${opt.value}', ${isMulti})">
            ${opt.label}${opt.sub ? `<br><span style="font-size:0.75rem;color:var(--muted);font-weight:300">${opt.sub}</span>` : ''}
          </button>
        `).join('')}
      </div>
      <div class="btn-row">
        ${currentStep > 1 ? `<button class="back-btn" onclick="prevStep()">← Back</button>` : ''}
        <button class="next-btn ${isMulti || answers[step.key] ? '' : 'disabled'}" id="nextBtn" onclick="nextStep()">
          ${currentStep === TOTAL_STEPS ? 'See My Scents →' : 'Continue →'}
        </button>
      </div>
    </div>
  `;
}

function isSelected(key, value, isMulti) {
  if (isMulti) return (answers[key] || []).includes(value);
  return answers[key] === value;
}

function hasAnswer(key, isMulti) {
  if (isMulti) return true; // can always proceed (0 selections = no filters)
  return !!answers[key];
}

function selectOption(key, value, isMulti) {
  if (isMulti) {
    if (!answers[key]) answers[key] = [];
    const idx = answers[key].indexOf(value);
    if (idx > -1) answers[key].splice(idx, 1);
    else answers[key].push(value);
  } else {
    answers[key] = value;
  }
  renderOptions(key, isMulti);
}

function renderOptions(key, isMulti) {
  const step = steps[currentStep - 1];
  let options = step.options;
  if (step.dynamic) options = branches[answers.scent] || [];

  document.querySelectorAll('.option').forEach((btn, i) => {
    const val = options[i]?.value;
    if (isMulti) {
      btn.classList.toggle('selected', (answers[key] || []).includes(val));
    } else {
      btn.classList.toggle('selected', answers[key] === val);
    }
  });

  // Update continue button state
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn && !isMulti) {
    nextBtn.classList.toggle('disabled', !answers[key]);
  }
}

function nextStep() {
  const step = steps[currentStep - 1];
  const isMulti = step.type === 'multi';
  if (!isMulti && !answers[step.key]) return; // mandatory block
  currentStep++;
  render();
}

function prevStep() {
  if (currentStep > 1) {
    currentStep--;
    render();
  }
}

  const pieces = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 100,
    w: 6 + Math.random() * 8,
    h: 10 + Math.random() * 8,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * 360,
    rotSpeed: (Math.random() - 0.5) * 6,
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 4,
    opacity: 1
  }));

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.rotSpeed;
      if (frame > 90) p.opacity -= 0.015;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 160) requestAnimationFrame(animate);
    else canvas.remove();
  }
  animate();
}

// ============================================================
// RESULTS
// ============================================================
function renderResults() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Your recommendations';
  launchConfetti();

  const matched = perfumes.filter(p => {
    // Budget filter — show all perfumes UP TO the selected max
    if (answers.budget) {
      const maxPrice = { '500-1000': 1000, '1000-2000': 2000, '2000-3000': 3000 }[answers.budget];
      if (p.price > maxPrice) return false;
    }
    // Occasion filter
    if (answers.occasion && !p.occasion.includes(answers.occasion)) return false;
    // Longevity filter
    if (answers.longevity && !p.longevity.includes(answers.longevity)) return false;
    // Can't stand filter
    if (answers.cantstand && answers.cantstand.length > 0) {
      for (const bad of answers.cantstand) {
        if (p.eliminatedBy.includes(bad)) return false;
      }
    }
    // Scent family
    if (answers.scent && p.scent !== answers.scent) return false;
    // Branch
    if (answers.branch && p.branch !== answers.branch) return false;
    return true;
  });

  // Fallback — relax branch if no results
  let perfectMatch = matched;
  
  // "You may also like" — same scent family, passes cant-stand, within budget, different branch
  let mayAlsoLike = perfumes.filter(p => {
    if (perfectMatch.includes(p)) return false;
    if (answers.budget) {
      const maxPrice = { '500-1000': 1000, '1000-2000': 2000, '2000-3000': 3000 }[answers.budget];
      if (p.price > maxPrice) return false;
    }
    if (answers.cantstand && answers.cantstand.length > 0) {
      for (const bad of answers.cantstand) {
        if (p.eliminatedBy.includes(bad)) return false;
      }
    }
    if (answers.scent && p.scent !== answers.scent) return false;
    return true;
  }).slice(0, 2);

  // If no perfect match, use scent-family matches as perfect and relax further for may-also-like
  if (perfectMatch.length === 0) {
    perfectMatch = mayAlsoLike.slice(0, 1);
    mayAlsoLike = perfumes.filter(p => {
      if (perfectMatch.includes(p)) return false;
      if (answers.cantstand && answers.cantstand.length > 0) {
        for (const bad of answers.cantstand) {
          if (p.eliminatedBy.includes(bad)) return false;
        }
      }
      return true;
    }).slice(0, 2);
  }

  const container = document.getElementById('quizContainer');

  if (perfectMatch.length === 0 && mayAlsoLike.length === 0) {
    container.innerHTML = `
      <div class="results-block">
        <div class="results-title">Your Results</div>
        <div class="results-headline">Hmm, nothing matched perfectly.</div>
        <p class="no-results">Try adjusting your preferences — your ideal scent is in here somewhere.</p>
        <button class="restart-btn" onclick="restart()">Start Over</button>
      </div>
    `;
    return;
  }

  container.innerHTML = `
    <div class="results-block">
      <div class="results-title">Your Results</div>
      <div class="results-headline">Your perfect <em>scent match.</em></div>
      ${perfectMatch.slice(0, 1).map(p => `
        <div class="perfume-card perfect">
          <div class="perfume-rank">✦ Perfect Match</div>
          <div class="perfume-name">${p.name}</div>
          <div class="perfume-brand">${p.brand} · ${p.type}</div>
          <div class="perfume-notes">
            <strong>Top:</strong> ${p.notes.top}<br>
            <strong>Heart:</strong> ${p.notes.mid}<br>
            <strong>Base:</strong> ${p.notes.base}
          </div>
          <div class="perfume-meta">
            <span>₹${p.price.toLocaleString()}</span>
            <span>${p.family}</span>
            <span>${p.where}</span>
          </div>
        </div>
      `).join('')}
      ${mayAlsoLike.length > 0 ? `
        <div style="font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;color:var(--muted);margin:1.5rem 0 1rem;letter-spacing:0.05em;">
          You may also like
        </div>
        ${mayAlsoLike.map(p => `
          <div class="perfume-card similar">
            <div class="perfume-name">${p.name}</div>
            <div class="perfume-brand">${p.brand} · ${p.type}</div>
            <div class="perfume-notes">
              <strong>Top:</strong> ${p.notes.top}<br>
              <strong>Heart:</strong> ${p.notes.mid}<br>
              <strong>Base:</strong> ${p.notes.base}
            </div>
            <div class="perfume-meta">
              <span>₹${p.price.toLocaleString()}</span>
              <span>${p.family}</span>
              <span>${p.where}</span>
            </div>
          </div>
        `).join('')}
      ` : ''}
      <button class="restart-btn" onclick="restart()">Retake Quiz</button>
    </div>
  `;
}

function restart() {
  answers = {};
  currentStep = 1;
  render();
}

// Init
render();
</script>
